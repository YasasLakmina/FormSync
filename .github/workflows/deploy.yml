name: Deploy FormSync to EC2

on:
  push:
    branches: [Deployment, net-bug-fix]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            echo "🏠 Starting deployment..."

            # ================================
            # 🐳 Install Docker (universal)
            # ================================
            if ! command -v docker &> /dev/null; then
              echo "🐳 Installing Docker..."

              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh

              sudo systemctl enable docker
              sudo systemctl start docker

              sudo usermod -aG docker $USER
            else
              echo "✅ Docker already installed"
            fi

            # ================================
            # 🔁 Fix permission for this session
            # ================================
            newgrp docker <<'EONG'

            echo "🐳 Docker version:"
            docker --version

            # Compose fallback function
            dc() {
              docker compose "$@" || docker-compose "$@"
            }

            # ================================
            # 📁 Setup project
            # ================================
            mkdir -p ~/formsync
            cd ~/formsync

            if [ -d ".git" ]; then
              echo "📥 Updating repo..."
              git fetch origin
              git reset --hard origin/Deployment
            else
              echo "📥 Cloning repo..."
              rm -rf ./* .[^.]* 2>/dev/null || true
              git clone https://github.com/${{ github.repository }}.git .
              git checkout Deployment
            fi

            cd formsync

            # ================================
            # ✅ Check compose file
            # ================================
            if [ ! -f docker-compose.yml ]; then
              echo "❌ docker-compose.yml not found!"
              exit 1
            fi

            # ================================
            # ⚙️ Create .env
            # ================================
            echo "⚙️ Creating .env..."

            cat <<EOF > .env
NODE_ENV=production
JWT_EXPIRES_IN=7d

OPENAI_BASE_URL=https://api.groq.com/openai/v1
OPENAI_MODEL=llama-3.3-70b-versatile

GATEWAY_PORT=3000
SCHEMA_ENGINE_PORT=3010
USER_SERVICE_PORT=3011
DTO_GENERATOR_PORT=3012
RUNTIME_ENGINE_PORT=3013
FORMGEN_SERVICE_PORT=3014

SCHEMA_ENGINE_URL=http://schema-enhancement-engine:3010
USER_SERVICE_URL=http://user-management-service:3011
DTO_GENERATOR_URL=http://backend-dto-generator:3012
RUNTIME_ENGINE_URL=http://runtime-binding-engine:3013
FORMGEN_SERVICE_URL=http://formgen-service:3014

SCHEMA_API_URL=http://schema-enhancement-engine:3010/schema
FRONTEND_URL=http://localhost

DOCKER_BUILDKIT=1
COMPOSE_DOCKER_CLI_BUILD=1

NPM_CONFIG_LOGLEVEL=warn
NPM_CONFIG_PROGRESS=false
NPM_CONFIG_AUDIT=false
NPM_CONFIG_FUND=false

JWT_SECRET=${{ secrets.JWT_SECRET }}
OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
DATABASE_URL=${{ secrets.DATABASE_URL }}
POSTGRES_USER=${{ secrets.POSTGRES_USER }}
POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
POSTGRES_DB=${{ secrets.POSTGRES_DB }}
EOF

            echo "✅ .env created"

            # ================================
            # 🧹 Cleanup
            # ================================
            echo "🧹 Cleaning old containers..."
            dc down || true

            docker system prune -af --volumes || true
            docker builder prune -af || true

            echo "📊 Disk space:"
            df -h /

            # ================================
            # 🔨 Build (sequential)
            # ================================
            echo "🔨 Building services..."

            for svc in schema-enhancement-engine user-management-service backend-dto-generator runtime-binding-engine formgen-service api-gateway frontend; do
              echo "📦 Building $svc..."
              dc build "$svc" || {
                echo "⚠️ Retry $svc..."
                docker builder prune -af || true
                dc build "$svc"
              }
            done

            # ================================
            # 🚀 Run
            # ================================
            echo "🚀 Starting services..."
            dc up -d --no-build

            sleep 15

            # ================================
            # 📊 Status
            # ================================
            echo "📊 Containers:"
            docker ps -a

            echo "📈 Usage:"
            docker system df

            # ================================
            # 🔍 Debug failures
            # ================================
            FAILED=$(docker ps -a --filter "status=exited" --format "{{.Names}}")

            if [ ! -z "$FAILED" ]; then
              echo "⚠️ Failed containers:"
              for c in $FAILED; do
                echo "==== $c logs ===="
                docker logs --tail 20 $c
              done
              exit 1
            fi

            echo "🎉 Deployment successful!"

            EONG