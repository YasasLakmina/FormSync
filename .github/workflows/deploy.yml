name: Deploy FormSync to EC2

# SYSTEM REQUIREMENTS:
# - EC2: t3.medium or larger (2+ vCPU, 4+ GB RAM)
# - Storage: 20+ GB available space
# - Docker Engine with BuildKit support

on:
  push:
    branches: [Deployment]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Increase timeout for Docker builds
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 25m # SSH command timeout
          script: |
            echo "🏠 Starting in directory: $(pwd)"

            # Ensure we're in the right directory
            mkdir -p ~/formsync
            cd ~/formsync
            echo "📁 Current directory: $(pwd)"

            echo "🔄 Configuring git and pulling latest code..."
            git config pull.rebase false || true

            # Check if directory is empty or has git repo
            if [ -d ".git" ]; then
              echo "📥 Updating existing repository..."
              git fetch origin
              git reset --hard origin/Deployment
            else
              echo "📥 Cloning fresh repository..."
              rm -rf ./* ./.* 2>/dev/null || true
              git clone https://github.com/${{ github.repository }}.git .
              git checkout Deployment
            fi

            echo "📁 Navigating to formsync subdirectory..."
            cd formsync
            echo "📂 Current directory: $(pwd)"
            echo "📄 Files in current directory:"
            ls -la

            # Verify docker-compose.yml exists
            if [ ! -f "docker-compose.yml" ]; then
              echo "❌ ERROR: docker-compose.yml not found!"
              echo "📋 Directory contents:"
              find . -name "docker-compose.yml" -type f
              exit 1
            fi
            echo "✅ Found docker-compose.yml"

            echo "⚙️ Creating environment file..."
            cat > .env <<'ENVEOF'
NODE_ENV=production
JWT_EXPIRES_IN=7d
OPENAI_BASE_URL=https://api.groq.com/openai/v1
OPENAI_MODEL=llama-3.3-70b-versatile
GATEWAY_PORT=3000
SCHEMA_ENGINE_PORT=3010
USER_SERVICE_PORT=3011
DTO_GENERATOR_PORT=3012
RUNTIME_ENGINE_PORT=3013
FORMGEN_SERVICE_PORT=3014
SCHEMA_ENGINE_URL=http://schema-enhancement-engine:3010
USER_SERVICE_URL=http://user-management-service:3011
DTO_GENERATOR_URL=http://backend-dto-generator:3012
RUNTIME_ENGINE_URL=http://runtime-binding-engine:3013
FORMGEN_SERVICE_URL=http://formgen-service:3014
SCHEMA_API_URL=http://schema-enhancement-engine:3010/schema
FRONTEND_URL=http://localhost:5173
DOCKER_BUILDKIT=1
COMPOSE_DOCKER_CLI_BUILD=1
NPM_CONFIG_LOGLEVEL=warn
NPM_CONFIG_PROGRESS=false
NPM_CONFIG_AUDIT=false
NPM_CONFIG_FUND=false
ENVEOF
            # Append secrets (these need variable expansion)
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
            
            echo "📋 .env file contents (redacted):"
            grep -v "SECRET\|PASSWORD\|KEY\|DATABASE_URL" .env || true

            echo "🐳 Stopping existing containers..."
            docker compose down -v 2>/dev/null || true

            echo "🧹 Pre-build cleanup..."
            docker system prune -f --volumes 2>/dev/null || true

            echo "⚙️ Configuring Docker for resource-limited environment..."
            # Limit Docker build parallelism to prevent resource exhaustion
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            echo "🔨 Building containers (sequential build to prevent timeout)..."
            echo "   📦 Building PostgreSQL..."
            docker compose build postgres || {
              echo "❌ Failed to build postgres"
              exit 1
            }

            echo "   📦 Building services (with build timeout)..."
            timeout 900s docker compose build --parallel 3 || {
              echo "⚠️  Parallel build timed out, trying sequential build..."
              
              # Try building the most resource-intensive services first
              echo "   🔨 Building schema-enhancement-engine..."
              docker compose build schema-enhancement-engine || echo "⚠️ Schema engine build failed"
              
              echo "   🔨 Building user-management-service..."  
              docker compose build user-management-service || echo "⚠️ User service build failed"
              
              echo "   🔨 Building remaining services..."
              docker compose build backend-dto-generator runtime-binding-engine formgen-service api-gateway frontend || echo "⚠️ Some service builds failed"
            }

            echo "🚀 Starting containers..."
            docker compose up -d --no-build

            # Wait for containers to stabilize
            echo "⏳ Waiting for containers to start..."
            sleep 15

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "📊 Final container status (ALL containers):"
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "🔍 Health check details:"
            docker inspect --format '{{.Name}}: {{.State.Health.Status}} ({{.State.Status}})' $(docker ps -aq) 2>/dev/null || echo "No health info"

            echo ""
            echo "📈 Resource usage:"
            docker system df || echo "Could not get resource usage"

            # Check for any non-running containers
            NOT_RUNNING=$(docker ps -a --filter "status=exited" --filter "status=created" --filter "status=restarting" --format "{{.Names}}" | head -5)
            if [ ! -z "$NOT_RUNNING" ]; then
              echo ""
              echo "⚠️  Non-running containers detected:"
              echo "$NOT_RUNNING" | while read container; do
                echo "=== $container logs (last 15 lines) ==="
                docker logs --tail 15 "$container" 2>&1 || echo "Could not get logs"
                echo ""
              done
            else
              echo "✅ All containers are running"
            fi

            # Final status check (subtract 1 for header line)
            RUNNING_COUNT=$(docker ps --filter "status=running" --format "{{.Names}}" | wc -l)
            TOTAL_COUNT=$(docker ps -a --format "{{.Names}}" | wc -l)
            if [ "$RUNNING_COUNT" -ge 7 ]; then
              echo "🎉 Deployment successful! $RUNNING_COUNT/$TOTAL_COUNT containers running"
            else
              echo "⚠️  Only $RUNNING_COUNT/$TOTAL_COUNT containers running - check logs above"
            fi

            echo "✅ Deployment script complete!"
