name: Deploy FormSync to EC2

# SYSTEM REQUIREMENTS:
# - EC2: t3.medium or larger (2+ vCPU, 4+ GB RAM)
# - Storage: 20+ GB available space
# - Docker Engine with BuildKit support

on:
  push:
    branches: [Deployment, net-bug-fix]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 55m
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            echo "=== Deploying branch: $BRANCH ==="

            # ── Install Docker if missing ─────────────────────────────────
            if ! command -v docker &>/dev/null; then
              echo "Docker not found — installing..."
              if command -v apt-get &>/dev/null; then
                curl -fsSL https://get.docker.com | sudo sh
              elif command -v yum &>/dev/null; then
                sudo yum install -y docker
              fi
              sudo systemctl enable --now docker
            fi

            # Ensure Docker Compose v2 plugin is available
            if ! sudo docker compose version &>/dev/null; then
              echo "Installing Docker Compose plugin..."
              if command -v apt-get &>/dev/null; then
                sudo apt-get install -y docker-compose-plugin
              elif command -v yum &>/dev/null; then
                sudo yum install -y docker-compose-plugin
              fi
            fi

            # ── Clone / update repository ─────────────────────────────────
            mkdir -p ~/formsync && cd ~/formsync

            REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

            if [ -d ".git" ]; then
              echo "Updating repo to branch: $BRANCH"
              git fetch origin
              git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH" "origin/$BRANCH"
              git reset --hard "origin/$BRANCH"
            else
              echo "Cloning repo (branch: $BRANCH)..."
              git clone --branch "$BRANCH" --depth 1 "$REPO_URL" .
            fi

            # ── Navigate to project directory ─────────────────────────────
            cd formsync
            echo "Working directory: $(pwd)"
            ls -la

            if [ ! -f "docker-compose.yml" ]; then
              echo "ERROR: docker-compose.yml not found in $(pwd)"
              find ~/formsync -name "docker-compose.yml" 2>/dev/null
              exit 1
            fi
            echo "Found docker-compose.yml"

            # ── Write environment file ────────────────────────────────────
            echo "NODE_ENV=production" > .env
            echo "JWT_EXPIRES_IN=7d" >> .env
            echo "OPENAI_BASE_URL=https://api.groq.com/openai/v1" >> .env
            echo "OPENAI_MODEL=llama-3.3-70b-versatile" >> .env
            echo "GATEWAY_PORT=3000" >> .env
            echo "SCHEMA_ENGINE_PORT=3010" >> .env
            echo "USER_SERVICE_PORT=3011" >> .env
            echo "DTO_GENERATOR_PORT=3012" >> .env
            echo "RUNTIME_ENGINE_PORT=3013" >> .env
            echo "FORMGEN_SERVICE_PORT=3014" >> .env
            echo "NODE_BACKEND_GENERATOR_PORT=3015" >> .env
            echo "DOTNET_BACKEND_GENERATOR_PORT=3016" >> .env
            echo "SCHEMA_ENGINE_URL=http://schema-enhancement-engine:3010" >> .env
            echo "USER_SERVICE_URL=http://user-management-service:3011" >> .env
            echo "DTO_GENERATOR_URL=http://backend-dto-generator:3012" >> .env
            echo "RUNTIME_ENGINE_URL=http://runtime-binding-engine:3013" >> .env
            echo "FORMGEN_SERVICE_URL=http://formgen-service:3014" >> .env
            echo "NODE_BACKEND_GENERATOR_URL=http://node-backend-generator:3015" >> .env
            echo "DOTNET_BACKEND_GENERATOR_URL=http://dotnet-backend-generator:3016" >> .env
            echo "SCHEMA_API_URL=http://schema-enhancement-engine:3010/schema" >> .env
            echo "FRONTEND_URL=http://localhost" >> .env
            echo "DOCKER_BUILDKIT=1" >> .env
            echo "COMPOSE_DOCKER_CLI_BUILD=1" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env

            echo ".env contents (secrets redacted):"
            grep -v "SECRET\|PASSWORD\|KEY\|DATABASE_URL" .env || true

            # ── Authenticate to Docker Hub to avoid anonymous pull rate limits ─
            if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
              echo "Logging in to Docker Hub as $DOCKERHUB_USERNAME..."
              echo "$DOCKERHUB_TOKEN" | sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            else
              echo "WARNING: DOCKERHUB_USERNAME / DOCKERHUB_TOKEN not set — pulls will be anonymous and may hit rate limits"
            fi

            # ── Stop existing containers — preserve DB volumes ─────────────
            echo "Stopping existing containers (volumes kept)..."
            sudo docker compose down --rmi local 2>/dev/null || true

            # Prune only dangling images and build cache — NOT volumes
            sudo docker image prune -f 2>/dev/null || true
            sudo docker builder prune -af 2>/dev/null || true

            echo "Disk before build: $(df -h / | tail -1)"

            # ── Build services one at a time to conserve disk ──────────────
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            SERVICES="schema-enhancement-engine user-management-service backend-dto-generator runtime-binding-engine formgen-service node-backend-generator dotnet-backend-generator api-gateway frontend"

            for svc in $SERVICES; do
              echo "--- Building: $svc ---"
              if ! sudo docker compose build "$svc"; then
                echo "Build failed — pruning cache and retrying $svc..."
                sudo docker builder prune -af 2>/dev/null || true
                if ! sudo docker compose build "$svc"; then
                  echo "FATAL: $svc could not be built"
                  exit 1
                fi
              fi
              # Free build cache between services to prevent disk exhaustion
              sudo docker builder prune -af 2>/dev/null || true
              echo "Disk after $svc: $(df -h / | tail -1)"
            done

            # ── Start all services ────────────────────────────────────────
            echo "Starting all services..."
            sudo docker compose up -d --no-build

            echo "Waiting 20s for services to stabilise..."
            sleep 20

            # ── Status report ─────────────────────────────────────────────
            echo "=== Container status ==="
            sudo docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "=== Health details ==="
            sudo docker inspect --format '{{.Name}}: {{.State.Health.Status}} ({{.State.Status}})' $(sudo docker ps -aq) 2>/dev/null || true

            echo "=== Resource usage ==="
            sudo docker system df || true

            # Print logs for any unhealthy / stopped containers
            NOT_RUNNING=$(sudo docker ps -a \
              --filter "status=exited" \
              --filter "status=created" \
              --filter "status=restarting" \
              --format "{{.Names}}")

            if [ -n "$NOT_RUNNING" ]; then
              echo "=== Non-running containers (last 25 log lines each) ==="
              echo "$NOT_RUNNING" | while read -r c; do
                echo "--- $c ---"
                sudo docker logs --tail 25 "$c" 2>&1 || true
              done
              exit 1
            fi

            RUNNING=$(sudo docker ps --filter "status=running" --format "{{.Names}}" | wc -l)
            echo "=== Deployment complete: $RUNNING containers running ==="
