name: Deploy FormSync to EC2

on:
  push:
    branches: [Deployment, net-bug-fix]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e

            echo "🏠 Starting in directory: $(pwd)"

            # ================================
            # 🐳 Install Docker if missing
            # ================================
            if ! command -v docker &> /dev/null; then
              echo "🐳 Docker not found. Installing..."
              sudo apt update -y
              sudo apt install -y docker.io docker-compose-plugin
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            else
              echo "✅ Docker already installed"
            fi

            # Apply group permissions
            newgrp docker <<'EONG'

            echo "🐳 Docker version:"
            docker --version
            docker compose version

            # ================================
            # 📁 Setup project directory
            # ================================
            mkdir -p ~/formsync
            cd ~/formsync

            echo "📁 Current directory: $(pwd)"

            # ================================
            # 📥 Git operations
            # ================================
            if [ -d ".git" ]; then
              echo "📥 Updating existing repository..."
              git fetch origin
              git reset --hard origin/Deployment
            else
              echo "📥 Cloning fresh repository..."
              rm -rf ./* .[^.]* 2>/dev/null || true
              git clone https://github.com/${{ github.repository }}.git .
              git checkout Deployment
            fi

            echo "📁 Navigating to formsync subdirectory..."
            cd formsync

            echo "📂 Current directory: $(pwd)"
            ls -la

            # ================================
            # ✅ Verify docker-compose
            # ================================
            if [ ! -f "docker-compose.yml" ]; then
              echo "❌ docker-compose.yml not found!"
              exit 1
            fi

            # ================================
            # ⚙️ Create .env
            # ================================
            echo "⚙️ Creating environment file..."

            {
              echo "NODE_ENV=production"
              echo "JWT_EXPIRES_IN=7d"
              echo "OPENAI_BASE_URL=https://api.groq.com/openai/v1"
              echo "OPENAI_MODEL=llama-3.3-70b-versatile"

              echo "GATEWAY_PORT=3000"
              echo "SCHEMA_ENGINE_PORT=3010"
              echo "USER_SERVICE_PORT=3011"
              echo "DTO_GENERATOR_PORT=3012"
              echo "RUNTIME_ENGINE_PORT=3013"
              echo "FORMGEN_SERVICE_PORT=3014"

              echo "SCHEMA_ENGINE_URL=http://schema-enhancement-engine:3010"
              echo "USER_SERVICE_URL=http://user-management-service:3011"
              echo "DTO_GENERATOR_URL=http://backend-dto-generator:3012"
              echo "RUNTIME_ENGINE_URL=http://runtime-binding-engine:3013"
              echo "FORMGEN_SERVICE_URL=http://formgen-service:3014"

              echo "SCHEMA_API_URL=http://schema-enhancement-engine:3010/schema"
              echo "FRONTEND_URL=http://localhost"

              echo "DOCKER_BUILDKIT=1"
              echo "COMPOSE_DOCKER_CLI_BUILD=1"

              echo "NPM_CONFIG_LOGLEVEL=warn"
              echo "NPM_CONFIG_PROGRESS=false"
              echo "NPM_CONFIG_AUDIT=false"
              echo "NPM_CONFIG_FUND=false"

              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
              echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            } > .env

            echo "📋 .env created (sensitive values hidden)"

            # ================================
            # 🐳 Stop existing containers
            # ================================
            echo "🐳 Stopping existing containers..."
            docker compose down || true

            # ================================
            # 🧹 Cleanup
            # ================================
            echo "🧹 Cleaning Docker system..."
            docker system prune -af --volumes || true
            docker builder prune -af || true

            echo "📊 Disk space:"
            df -h /

            # ================================
            # 🔨 Build services
            # ================================
            echo "🔨 Building services sequentially..."

            for svc in schema-enhancement-engine user-management-service backend-dto-generator runtime-binding-engine formgen-service api-gateway frontend; do
              echo "📦 Building $svc..."
              docker compose build "$svc" || {
                echo "⚠️ Retry build for $svc..."
                docker builder prune -af || true
                docker compose build "$svc"
              }
              docker builder prune -af || true
            done

            # ================================
            # 🚀 Start containers
            # ================================
            echo "🚀 Starting containers..."
            docker compose up -d --no-build

            echo "⏳ Waiting for startup..."
            sleep 15

            # ================================
            # 📊 Status
            # ================================
            echo "📊 Container status:"
            docker ps -a

            echo "📈 Resource usage:"
            docker system df

            # ================================
            # 🔍 Debug failed containers
            # ================================
            NOT_RUNNING=$(docker ps -a --filter "status=exited" --filter "status=restarting" --format "{{.Names}}" | head -5)

            if [ ! -z "$NOT_RUNNING" ]; then
              echo "⚠️ Some containers failed:"
              for c in $NOT_RUNNING; do
                echo "=== Logs for $c ==="
                docker logs --tail 20 $c
              done
            else
              echo "✅ All containers running"
            fi

            echo "🎉 Deployment complete!"

            EONG