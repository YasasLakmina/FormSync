name: Deploy FormSync to EC2

# SYSTEM REQUIREMENTS:
# - EC2: t3.medium or larger (2+ vCPU, 4+ GB RAM)
# - Storage: 20+ GB available space
# - Docker Engine with BuildKit support

on:
  push:
    branches: [Deployment]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Increase timeout for Docker builds
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 25m # SSH command timeout
          script: |
            echo "🏠 Starting in directory: $(pwd)"

            # Ensure we're in the right directory
            mkdir -p ~/formsync
            cd ~/formsync
            echo "📁 Current directory: $(pwd)"

            echo "🔄 Configuring git and pulling latest code..."
            git config pull.rebase false || true

            # Check if directory is empty or has git repo
            if [ -d ".git" ]; then
              echo "📥 Updating existing repository..."
              git fetch origin
              git reset --hard origin/Deployment
            else
              echo "📥 Cloning fresh repository..."
              rm -rf ./* ./.* 2>/dev/null || true
              git clone https://github.com/${{ github.repository }}.git .
              git checkout Deployment
            fi

            echo "📁 Navigating to formsync subdirectory..."
            cd formsync
            echo "📂 Current directory: $(pwd)"
            echo "📄 Files in current directory:"
            ls -la

            # Verify docker-compose.yml exists
            if [ ! -f "docker-compose.yml" ]; then
              echo "❌ ERROR: docker-compose.yml not found!"
              echo "📋 Directory contents:"
              find . -name "docker-compose.yml" -type f
              exit 1
            fi
            echo "✅ Found docker-compose.yml"

            echo "⚙️ Creating environment file..."
            {
              echo "NODE_ENV=production"
              echo "JWT_EXPIRES_IN=7d"
              echo "OPENAI_BASE_URL=https://api.groq.com/openai/v1"
              echo "OPENAI_MODEL=llama-3.3-70b-versatile"
              echo "GATEWAY_PORT=3000"
              echo "SCHEMA_ENGINE_PORT=3010"
              echo "USER_SERVICE_PORT=3011"
              echo "DTO_GENERATOR_PORT=3012"
              echo "RUNTIME_ENGINE_PORT=3013"
              echo "FORMGEN_SERVICE_PORT=3014"
              echo "SCHEMA_ENGINE_URL=http://schema-enhancement-engine:3010"
              echo "USER_SERVICE_URL=http://user-management-service:3011"
              echo "DTO_GENERATOR_URL=http://backend-dto-generator:3012"
              echo "RUNTIME_ENGINE_URL=http://runtime-binding-engine:3013"
              echo "FORMGEN_SERVICE_URL=http://formgen-service:3014"
              echo "SCHEMA_API_URL=http://schema-enhancement-engine:3010/schema"
              echo "FRONTEND_URL=http://localhost"
              echo "DOCKER_BUILDKIT=1"
              echo "COMPOSE_DOCKER_CLI_BUILD=1"
              echo "NPM_CONFIG_LOGLEVEL=warn"
              echo "NPM_CONFIG_PROGRESS=false"
              echo "NPM_CONFIG_AUDIT=false"
              echo "NPM_CONFIG_FUND=false"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
              echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            } > .env

            echo "📋 .env file contents (redacted):"
            grep -v "SECRET\|PASSWORD\|KEY\|DATABASE_URL" .env || true

            echo "🐳 Stopping existing containers..."
            docker compose down --rmi local 2>/dev/null || true

            echo "🧹 Pre-build cleanup — reclaim all unused space..."
            docker system prune -af --volumes 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            echo "📊 Disk space before build:"
            df -h / | tail -1

            echo "⚙️ Configuring Docker for resource-limited environment..."
            # Limit Docker build parallelism to prevent resource exhaustion
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            echo "🔨 Building containers sequentially to conserve disk..."

            # Build each service one at a time, pruning build cache between builds
            for svc in schema-enhancement-engine user-management-service backend-dto-generator runtime-binding-engine formgen-service api-gateway frontend; do
              echo "   📦 Building $svc..."
              docker compose build "$svc" || {
                echo "⚠️  Build failed for $svc, pruning and retrying..."
                docker builder prune -af 2>/dev/null || true
                docker compose build "$svc" || echo "❌ $svc build failed"
              }
              # Clear build cache after each service to free disk
              docker builder prune -af 2>/dev/null || true
            done

            echo "🚀 Starting containers..."
            docker compose up -d --no-build

            # Wait for containers to stabilize
            echo "⏳ Waiting for containers to start..."
            sleep 15

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "📊 Final container status (ALL containers):"
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "🔍 Health check details:"
            docker inspect --format '{{.Name}}: {{.State.Health.Status}} ({{.State.Status}})' $(docker ps -aq) 2>/dev/null || echo "No health info"

            echo ""
            echo "📈 Resource usage:"
            docker system df || echo "Could not get resource usage"

            # Check for any non-running containers
            NOT_RUNNING=$(docker ps -a --filter "status=exited" --filter "status=created" --filter "status=restarting" --format "{{.Names}}" | head -5)
            if [ ! -z "$NOT_RUNNING" ]; then
              echo ""
              echo "⚠️  Non-running containers detected:"
              echo "$NOT_RUNNING" | while read container; do
                echo "=== $container logs (last 15 lines) ==="
                docker logs --tail 15 "$container" 2>&1 || echo "Could not get logs"
                echo ""
              done
            else
              echo "✅ All containers are running"
            fi

            # Final status check (subtract 1 for header line)
            RUNNING_COUNT=$(docker ps --filter "status=running" --format "{{.Names}}" | wc -l)
            TOTAL_COUNT=$(docker ps -a --format "{{.Names}}" | wc -l)
            if [ "$RUNNING_COUNT" -ge 7 ]; then
              echo "🎉 Deployment successful! $RUNNING_COUNT/$TOTAL_COUNT containers running"
            else
              echo "⚠️  Only $RUNNING_COUNT/$TOTAL_COUNT containers running - check logs above"
            fi

            echo "✅ Deployment script complete!"
